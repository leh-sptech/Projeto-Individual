<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VinilDesk</title>

    <script src="./js/sessao.js"></script>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">

</head>
<body class="body_login">
    <header>
        <div class="navbar">
            <a href="index.html"><img id='logo_titulo' src="./assets/logo.png"></a>
            <input id="pesquisa" placeholder="Pesquisar">
            <a href="login.html"><img id="logo_login" src="./assets/user.png"></a>
        </div>
    </header>

    <div class="alerta_erro">
        <div class="card_erro" id="cardErro">
          <span id="mensagem_erro"></span>
          </div>
    </div>

    <div class="container_login">

        <div class="login">
            <h1>Login</h1>
            <p class="informations">Email:</p>
            <input id="email_input">

            <p class="informations">Senha:</p>
            <input id="senha_input" type="password">

            <button id="botao_login" onclick="entrar()">Entrar</button>

            <p id="p_senha">Esqueceu a senha? Clique aqui!</p>
        </div>
        <div class="meio">
            <h3>Ou</h3>
        </div>
        <div class="cadastro">
            <h1>Cadastre-se</h1>
            <p class="informations">Nome:</p>
            <input id="nome_input">

            <p class="informations">Email:</p>
            <input id="email_input2">

            <p class="informations">Senha:</p>
            <input id="senha_input2" type="password">

            <p class="informations">Telefone:</p>
            <input id="ipt_telefone">

            <button id="botao_registro" onclick="cadastrar()">Criar Conta</button>
        </div>

        <div id="div_erros_login"></div>
    </div>
</body>
</html>

<script>


    function entrar() {
        
        console.log('apertou!')
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 6000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                cardErro.style.display = "block";

                mensagem_erro.innerHTML = "Login realizado com sucesso!";

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location = "userpage.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                throw "Houve um erro ao tentar realizar o login!";

                cardErro.style.display = "block";

                mensagem_erro.innerHTML = "Houve um erro ao tentar realizar o login!";

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }


  function cadastrar() {

    console.log('apertou!')
    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    let nomeVar = nome_input.value;
    let emailVar = email_input2.value;
    let senhaVar = senha_input2.value;
    let telefoneVar = ipt_telefone.value;


    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      telefoneVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 6000);
    }

      let Arroba = emailVar.indexOf('@');
      let Ponto = emailVar.lastIndexOf('.');
      

      if (Arroba <= 0 || Ponto <= Arroba + 1 || Ponto >= emailVar.length - 1) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "O e-mail digitado é inválido.";
        return false;
      }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        telefoneServer: telefoneVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso!";

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
          
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }

</script>
