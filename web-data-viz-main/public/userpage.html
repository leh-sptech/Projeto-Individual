<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - VinilDesk</title>

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <a href="index.html"><img id='logo_titulo' src="./assets/logo.png"></a>
            <input id="pesquisa" placeholder="Pesquisar">
            <a href="login.html"><img id="logo_login" src="./assets/user.png"></a>
        </div>
    </header>

    <div class="container_user">
        <div class="container_botoes">
            <a href="#"><p>Cadastrar Disco</p></a>
            <a href="./meusdiscos.html"><p>Meus Discos</p></a>
            <a href="./dashboard/dashboard.html"><p>DashBoards</p></a>
        </div>

        <div class="container_disc">
            <p>Nome do Artista:</p>
            <input class="input_discos" id="ipt_artista">
            <p>Titulo do Album:</p>
            <input class="input_discos" id="ipt_album">
            <p>Ano de lancamento do Album:</p>
            <input class="input_discos" id="ipt_ano">
            <p>Genero do Album:</p>
            <input class="input_discos" id="ipt_genero">
            <p>Condicao do Vinil:</p>
            <input class="input_discos" id="ipt_cond">
            <button id="botao_registro" onclick="cadastrarDisco()">Cadastrar</button>
        </div>
        <div class="container_image">
            <img src="./assets/covers/afterhours.png">
        </div>
    </div>


    <footer>
        <div class="contact">
            <p>Contato: <span>contato@vinildesk.com</span></p>
            <p>Endereço: <span>Rua Haddock Lobo, 595 - São Paulo, SP</span></p>
        </div>    
        <img src="./assets/logo.png">
    </footer>
</body>
</html>
<script>
    function cadastrarDisco() {

        let artistaVar = ipt_artista.value;
        let discoVar = ipt_album.value;
        let anoVar = ipt_ano.value;
        let generoVar = ipt_genero.value;        
        let condicaoVar = ipt_cond.value;

        if (artistaVar == "" ||
            discoVar == ""
        ){
            cardErro.style.display = "block";
            mensagem_erro.innerHTML =
            "(Mensagem de erro para todos os campos em branco)";

            finalizarAguardar();
            return false;
        } 
            
    
        fetch("/discos/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
                artistaServer: artistaVar,
                discoServer: discoVar,
                anoServer: anoVar,
                generoServer: generoVar,
                condicaoServer: condicaoVar
            }),
        })
        .then(function (resposta) {
            console.log("resposta: ", resposta);

            if (resposta.ok) {
              cardErro.style.display = "block";

              mensagem_erro.innerHTML =
                "Cadastro realizado com sucesso!";

              limparFormulario();
              finalizarAguardar();
            } else {
              throw "Houve um erro ao tentar realizar o cadastro!";
            
            }
        })    
        .catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
            finalizarAguardar();
        });

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none";
    }
    
</script>
