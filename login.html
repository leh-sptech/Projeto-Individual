<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VinilDesk</title>
    <link rel="stylesheet" href="style.css">

</head>
<body class="body_login">
    <header>
            <div class="navbar">
            <img id='logo_titulo' src="./assets/logo.png">
            <input id="pesquisa" placeholder="Pesquisar">
            <a href="login.html"><img src="./assets/user.png"></a>
        </div>
    </header>
    <div class="container_login">
        <div class="login">
            <h2>Login</h2>
            <p>Email:</p>
            <input id="ipt_email">

            <p>Senha:</p>
            <input id="ipt_senha">

            <button id="botao_login" onclick="">Entrar</button>

            <p id="p_senha">Esqueceu a senha? Clique aqui!</p>
        </div>
        <div class="meio">
            <h3>Ou</h3>
        </div>
        <div class="cadastro">
            <h2>Cadastre-se</h2>
            <p>Nome:</p>
            <input id="ipt_nome">

            <p>Email:</p>
            <input id="ipt_email_cadastro">

            <p>Senha:</p>
            <input id="ipt_senha">

            <p>Telefone:</p>
            <input id="ipt_telefone">

            <button onclick="">Criar Conta</button>
        </div>
    </div>
</body>
</html>
