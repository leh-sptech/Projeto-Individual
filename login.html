<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VinilDesk</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">

</head>
<body class="body_login">
    <header>
            <div class="navbar">
                <a href="index.html"><img id='logo_titulo' src="./assets/logo.png"></a>
                <input id="pesquisa" placeholder="Pesquisar">
                <a href="login.html"><img id="logo_login" src="./assets/user.png"></a>
        </div>
    </header>
    <div class="container_login">
        <div class="login">
            <h1>Login</h1>
            <p class="informations">Email:</p>
            <input id="ipt_email">

            <p class="informations">Senha:</p>
            <input id="ipt_senha" type="password">

            <button id="botao_login" onclick="">Entrar</button>

            <p id="p_senha">Esqueceu a senha? Clique aqui!</p>
        </div>
        <div class="meio">
            <h3>Ou</h3>
        </div>
        <div class="cadastro">
            <h1>Cadastre-se</h1>
            <p class="informations">Nome:</p>
            <input id="ipt_nome">

            <p class="informations">Email:</p>
            <input id="ipt_email_cadastro">

            <p class="informations">Senha:</p>
            <input id="ipt_senha">

            <p class="informations">Telefone:</p>
            <input id="ipt_telefone">

            <button id="botao_registro" onclick="">Criar Conta</button>
        </div>
    </div>
</body>
</html>
